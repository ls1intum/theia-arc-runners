# Example: How to use the stateful BuildKit workers from a consumer repository.
#
# Copy this file into your repository's .github/workflows/ and adapt the
# build-push steps to your actual image/tags. The only required changes from a
# standard build workflow are:
#
#   1. runs-on: arc-runner-set-buildkit-exp      ← experimental runner set
#   2. - uses: ls1intum/theia-arc-runners/.github/actions/buildkit-setup@feat/stateful-buildkit-runners
#      with:
#        dockerfile: path/to/your/Dockerfile    ← per-Dockerfile cache locality
#
# Everything else (checkout, login, build-push) stays exactly the same.
#
# NOTE: This is an example file — it is not a real workflow executed by this repo.

name: Build (BuildKit experimental)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build and push image
    # Opt into the experimental runner set that connects to stateful BuildKit workers.
    # Production jobs continue using: runs-on: arc-runner-set-stateless
    runs-on: arc-runner-set-buildkit-exp

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Route this job to the correct BuildKit worker and configure Buildx.
      # Hash key: "${{ github.repository }}::docker/Dockerfile"
      # The same repo+Dockerfile combination always lands on the same worker pod,
      # so its PVC layer cache is always warm after the first run.
      - name: Set up BuildKit
        id: buildkit
        uses: ls1intum/theia-arc-runners/.github/actions/buildkit-setup@feat/stateful-buildkit-runners
        with:
          # Set this to the Dockerfile path for this specific image.
          # If your repo builds multiple images from different Dockerfiles, each
          # gets its own worker slot — adjust this per job.
          dockerfile: docker/Dockerfile

      # Optional: log in to your registry before building.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push — no cache-from/cache-to flags needed.
      # The BuildKit worker's PVC is the cache; it's always warm after the first run.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-image:latest
            ghcr.io/${{ github.repository_owner }}/my-image:${{ github.sha }}
          # BuildKit handles multi-platform builds if the worker supports them.
          # For AMD64-only builds (theia-prod), omit platforms entirely.
          # platforms: linux/amd64

      # Optional: show which worker handled this build for debugging.
      - name: Report BuildKit worker
        if: always()
        run: |
          echo "BuildKit worker ID : ${{ steps.buildkit.outputs.worker-id }}"
          echo "BuildKit endpoint  : ${{ steps.buildkit.outputs.endpoint }}"

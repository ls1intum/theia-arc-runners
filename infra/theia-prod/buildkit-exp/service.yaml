apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: buildkit-exp
  labels:
    app: buildkitd
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/part-of: theia-arc-runners
spec:
  # Headless — gives each pod a stable DNS entry without load balancing.
  # Runner pods address workers directly via:
  #   tcp://buildkitd-N.buildkitd.buildkit-exp.svc.cluster.local:1234
  clusterIP: None
  selector:
    app: buildkitd
  ports:
    - name: buildkitd
      port: 1234
      targetPort: 1234
      protocol: TCP

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: buildkitd
  namespace: buildkit-exp
  labels:
    app: buildkitd
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/part-of: theia-arc-runners
spec:
  serviceName: buildkitd
  podManagementPolicy: Parallel
  replicas: 5
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
        app.kubernetes.io/name: buildkitd
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: buildkitd
          image: moby/buildkit:latest-rootless
          args:
            - --addr
            - tcp://0.0.0.0:1234
            # Required for rootless mode without a nested user namespace (kernel >= 5.11).
            # Avoids the need for privileged containers while still using the OCI snapshotter.
            - --oci-worker-no-process-sandbox
          ports:
            - containerPort: 1234
              name: buildkitd
              protocol: TCP
          readinessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["buildctl", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            # Required for rootless BuildKit — seccomp and AppArmor must be unconfined so
            # that the user-namespace-based snapshotter can function without extra privileges.
            seccompProfile:
              type: Unconfined
            appArmorProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 8000m
              memory: 16Gi
          volumeMounts:
            - name: buildkit-cache
              # Rootless BuildKit stores its content-addressed snapshot store here.
              mountPath: /home/user/.local/share/buildkit
  volumeClaimTemplates:
    - metadata:
        name: buildkit-cache
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: csi-rbd-sc
        resources:
          requests:
            # 100 Gi per worker. BuildKit's built-in GC triggers at 75% and trims to 60%,
            # so workers self-manage. Can be resized online via Ceph RBD if needed.
            storage: 100Gi

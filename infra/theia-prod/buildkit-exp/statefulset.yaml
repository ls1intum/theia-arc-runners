apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: buildkitd
  namespace: buildkit-exp
  labels:
    app: buildkitd
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/part-of: theia-arc-runners
spec:
  serviceName: buildkitd
  podManagementPolicy: Parallel
  replicas: 5
  selector:
    matchLabels:
      app: buildkitd
  template:
    metadata:
      labels:
        app: buildkitd
        app.kubernetes.io/name: buildkitd
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: buildkitd
          # Privileged variant — theia-prod runs kernel 5.4 (Ubuntu 20.04) which is below
          # the 5.11 minimum required for rootless --oci-worker-no-process-sandbox.
          # Privileged mode is already used by DinD in runner pods on this cluster.
          image: moby/buildkit:latest
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --allow-insecure-entitlement
            - network.host
            - --config
            - /etc/buildkit/buildkitd.toml
          ports:
            - containerPort: 1234
              name: buildkitd
              protocol: TCP
          readinessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://localhost:1234", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://localhost:1234", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 8000m
              memory: 16Gi
          volumeMounts:
            - name: buildkit-cache
              mountPath: /var/lib/buildkit
            - name: config
              mountPath: /etc/buildkit
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: buildkitd-config
  volumeClaimTemplates:
    - metadata:
        name: buildkit-cache
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: csi-rbd-sc
        resources:
          requests:
            # 100 Gi per worker. BuildKit's built-in GC triggers at 75% and trims to 60%,
            # so workers self-manage. Can be resized online via Ceph RBD if needed.
            storage: 100Gi

apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: buildkit
  labels:
    app: buildkitd
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/part-of: theia-arc-runners
data:
  buildkitd.toml: |
    # --- Registry mirrors (docker.io → Zot pull-through cache) ---
    [registry."docker.io"]
      mirrors = ["http://theia-zot.zot-system.svc.cluster.local:5000"]
    [registry."theia-zot.zot-system.svc.cluster.local:5000"]
      http = true

    # --- Garbage collection ---
    # Override defaults to remove the 48h/512MB cap on cache mounts.
    # Each worker has a 500Gi PVC at /var/lib/buildkit.
    [worker.oci]
      # Cache mounts (apt, yarn, pip) and source checkouts — keep 30 days.
      [[worker.oci.gcpolicy]]
        filters = ["type==source.local", "type==exec.cachemount", "type==source.git.checkout"]
        keepDuration = "720h"
        reservedSpace = "250GB"
        maxUsedSpace = "475GB"

      # Build layers and other records — keep 60 days.
      [[worker.oci.gcpolicy]]
        keepDuration = "1440h"
        reservedSpace = "50GB"
        maxUsedSpace = "475GB"

      # Fallback — evict everything if disk is nearly full.
      [[worker.oci.gcpolicy]]
        all = true
        maxUsedSpace = "475GB"
        minFreeSpace = "25GB"

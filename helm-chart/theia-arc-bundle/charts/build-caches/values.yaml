global:
  storageClass: ""
  nodeSelector: {}
  tolerations: []

dockerMirror:
  enabled: true
  pvcSize: 200Gi
  storageClass: ""
  ttl: "168h"  # 7 days (reduced from 30 days to prevent blob accumulation)
  resources:
    requests:
      cpu: 500m      # Increased from 100m for better throughput
      memory: 2Gi    # Increased from 256Mi to handle concurrent pulls
    limits:
      cpu: 2000m     # Increased from 1000m for peak load handling
      memory: 10Gi   # Increased from 1Gi to prevent OOM during heavy CI/CD
  garbageCollection:
    enabled: true
    schedule: "0 3 * * 0"  # Sunday at 3 AM
    deleteUntagged: true
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

ghcrMirror:
  enabled: true
  pvcSize: 200Gi
  storageClass: ""
  ttl: "168h"  # 7 days (reduced from 30 days to prevent blob accumulation)
  resources:
    requests:
      cpu: 500m      # Increased from 100m for better throughput
      memory: 2Gi    # Increased from 256Mi to handle concurrent pulls
    limits:
      cpu: 2000m     # Increased from 1000m for peak load handling
      memory: 10Gi   # Increased from 1Gi to prevent OOM during heavy CI/CD
  garbageCollection:
    enabled: true
    schedule: "0 3 * * 0"  # Sunday at 3 AM
    deleteUntagged: true
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

verdaccio:
  enabled: true
  pvcSize: 50Gi
  storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

aptCacher:
  enabled: true
  pvcSize: 50Gi
  storageClass: ""
  puid: 100
  pgid: 101
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

squid:
  enabled: true
  pvcSize: 20Gi
  storageClass: ""
  caSecretName: squid-ca-cert
  sslDomains:
    - .vsassets.io
    - .visualstudio.com
    - .open-vsx.org
    - open-vsx.org
    - .eclipsecontent.org
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

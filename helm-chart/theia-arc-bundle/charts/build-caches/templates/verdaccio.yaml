{{- if .Values.verdaccio.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: verdaccio
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: verdaccio
    app.kubernetes.io/component: npm-cache

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: verdaccio-config
  namespace: verdaccio
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: verdaccio
data:
  config.yaml: |
    storage: /verdaccio/storage
    
    listen: 0.0.0.0:4873
    
    uplinks:
      npmjs:
        url: https://registry.npmjs.org/
        cache: true
        timeout: 30s
        maxage: 30d
    
    packages:
      '@*/*':
        access: $all
        publish: $authenticated
        proxy: npmjs
      '**':
        access: $all
        publish: $authenticated
        proxy: npmjs
    
    server:
      keepAliveTimeout: 60
    
    middlewares:
      audit:
        enabled: true
    
    log:
      type: stdout
      format: pretty
      level: info

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: verdaccio-storage
  namespace: verdaccio
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: verdaccio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.verdaccio.storageClass | default .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.verdaccio.pvcSize }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verdaccio
  namespace: verdaccio
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: verdaccio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: verdaccio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: verdaccio
    spec:
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: verdaccio
          image: verdaccio/verdaccio:5
          ports:
            - containerPort: 4873
              name: http
          env:
            - name: VERDACCIO_PORT
              value: "4873"
          volumeMounts:
            - name: config
              mountPath: /verdaccio/conf
              readOnly: true
            - name: storage
              mountPath: /verdaccio/storage
          resources:
            {{- toYaml .Values.verdaccio.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /-/ping
              port: 4873
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/ping
              port: 4873
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: verdaccio-config
        - name: storage
          persistentVolumeClaim:
            claimName: verdaccio-storage

---
apiVersion: v1
kind: Service
metadata:
  name: verdaccio
  namespace: verdaccio
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: verdaccio
spec:
  type: ClusterIP
  ports:
    - port: 4873
      targetPort: 4873
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: verdaccio
{{- end }}

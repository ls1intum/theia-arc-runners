{{- if .Values.dockerMirror.enabled }}
{{- if .Values.dockerMirror.garbageCollection.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-gc-dockerhub
  namespace: registry-mirror
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: registry-gc-dockerhub
    app.kubernetes.io/component: maintenance
spec:
  schedule: {{ .Values.dockerMirror.garbageCollection.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: registry-gc-dockerhub
        spec:
          {{- with .Values.global.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.global.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          restartPolicy: OnFailure
          containers:
            - name: garbage-collect
              image: registry:2
              command:
                - /bin/registry
                - garbage-collect
                {{- if .Values.dockerMirror.garbageCollection.deleteUntagged }}
                - --delete-untagged=true
                {{- end }}
                - /etc/docker/registry/config.yml
              volumeMounts:
                - name: config
                  mountPath: /etc/docker/registry
                  readOnly: true
                - name: data
                  mountPath: /var/lib/registry
              resources:
                {{- toYaml .Values.dockerMirror.garbageCollection.resources | nindent 16 }}
          volumes:
            - name: config
              configMap:
                name: registry-config
            - name: data
              persistentVolumeClaim:
                claimName: registry-data
{{- end }}
{{- end }}


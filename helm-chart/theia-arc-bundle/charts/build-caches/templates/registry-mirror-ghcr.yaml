{{- if .Values.ghcrMirror.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: registry-ghcr-config
  namespace: registry-mirror
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: registry-mirror-ghcr
data:
  config.yml: |
    version: 0.1
    log:
      level: info
      formatter: json
    storage:
      filesystem:
        rootdirectory: /var/lib/registry
      cache:
        blobdescriptor: inmemory
      delete:
        enabled: true
      maintenance:
        uploadpurging:
          enabled: true
          age: {{ .Values.ghcrMirror.ttl }}
          interval: 24h
          dryrun: false
    http:
      addr: :5000
      headers:
        X-Content-Type-Options: [nosniff]
      timeout:
        read: 120s
        write: 120s
        idle: 120s
    validation:
      enabled: true
      manifests:
        urls:
          allow:
            - ^https?://
    proxy:
      remoteurl: https://ghcr.io
      ttl: {{ .Values.ghcrMirror.ttl }}
    health:
      storagedriver:
        enabled: true
        interval: 10s
        threshold: 3

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-ghcr-data
  namespace: registry-mirror
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: registry-mirror-ghcr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.ghcrMirror.storageClass | default .Values.global.storageClass }}
  resources:
    requests:
      storage: {{ .Values.ghcrMirror.pvcSize | quote }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-mirror-ghcr
  namespace: registry-mirror
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: registry-mirror-ghcr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry-mirror-ghcr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry-mirror-ghcr
    spec:
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /etc/docker/registry
              readOnly: true
            - name: data
              mountPath: /var/lib/registry
          resources:
            {{- toYaml .Values.ghcrMirror.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: registry-ghcr-config
        - name: data
          persistentVolumeClaim:
            claimName: registry-ghcr-data

---
apiVersion: v1
kind: Service
metadata:
  name: registry-mirror-ghcr
  namespace: registry-mirror
  labels:
    helm.sh/chart: {{ include "build-caches.chart" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: registry-mirror-ghcr
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: registry-mirror-ghcr
{{- end }}

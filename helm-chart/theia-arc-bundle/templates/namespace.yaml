{{- if and .Values.arcController.enabled .Values.createNamespaces }}
apiVersion: v1
kind: Namespace
metadata:
  name: arc-systems
  labels:
    {{- include "theia-arc-bundle.labels" . | nindent 4 }}
{{- end }}
{{- if and (or .Values.arcRunners.enabled .Values.arcRunnersArm.enabled .Values.arcRunnersExp.enabled .Values.arcRunnersArmBuildkit.enabled) .Values.createNamespaces }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-runners
  labels:
    {{- include "theia-arc-bundle.labels" . | nindent 4 }}
{{- end }}

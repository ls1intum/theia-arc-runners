{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-arc-secret
  namespace: arc-runners
  labels:
    {{- include "theia-arc-bundle.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: SecretStore
  target:
    name: github-arc-secret
    creationPolicy: Owner
  data:
    - secretKey: github_token
      remoteRef:
        key: {{ .Values.externalSecrets.githubPat.remoteRef.key }}
        property: {{ .Values.externalSecrets.githubPat.remoteRef.property }}
{{- end }}

global:
  storageClass: "csi-rbd-sc"
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []

createNamespaces: true

arcController:
  enabled: true

arcRunners:
  enabled: true
  githubConfigUrl: "https://github.com/ls1intum"
  githubConfigSecret: "github-arc-secret"
  minRunners: 10
  maxRunners: 50
  runnerScaleSetName: "arc-runner-set-stateless"
  controllerServiceAccount:
    namespace: arc-systems
    # This must match <Part-1-release-name>-gha-rs-controller.
    # Part 1 MUST be deployed with: helm install theia-arc-systems ...
    name: theia-arc-systems-gha-rs-controller
  template:
    spec:
      serviceAccountName: arc-runner-set-stateless-sa
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --group=1001
            # Route docker.io pulls through Zot pull-through cache to avoid Docker Hub rate limits.
            # Uses the NodePort URL so the same address works from both theia-prod and parma clusters.
            - --registry-mirror=http://131.159.88.30:30081
            - --insecure-registry=131.159.88.30:30081
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: runner
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
            # The falcondev runner reads CUSTOM_ACTIONS_RESULTS_URL from the
            # system environment and uses it to override the GitHub-provided
            # ACTIONS_RESULTS_URL before passing it to actions.  Without this,
            # the runner binary replaces our pod-level ACTIONS_RESULTS_URL with
            # GitHub's own ResultsServiceUrl, so cache traffic goes to GitHub
            # instead of our self-hosted cache server.
            - name: CUSTOM_ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}

arcRunnersArm:
  enabled: false
  githubConfigUrl: "https://github.com/ls1intum"
  githubConfigSecret: "github-arc-secret"
  minRunners: 10
  maxRunners: 50
  runnerScaleSetName: "arc-runner-set-arm64"
  controllerServiceAccount:
    namespace: arc-systems
    # Must match <Part-1-release-name>-gha-rs-controller (release name must be theia-arc-systems)
    name: theia-arc-systems-gha-rs-controller
  template:
    spec:
      serviceAccountName: arc-runner-set-stateless-arm-sa
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --group=1001
            # Route docker.io pulls through theia-prod Zot NodePort reachable cross-cluster.
            - --registry-mirror=http://131.159.88.30:30081
            - --insecure-registry=131.159.88.30:30081
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: runner
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
            - name: CUSTOM_ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: work
          emptyDir:
            medium: Memory
            sizeLimit: 30Gi
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}

cache-server:
  enabled: true
  replicaCount: 1
  config:
    # Must include port — the auto-generated default omits it.
    apiBaseUrl: "http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000"
    enableDirectDownloads: false
    cacheCleanupOlderThanDays: 90
    storage:
      driver: filesystem
      filesystem:
        path: /data/cache
    db:
      driver: sqlite
      sqlite:
        path: /data/cache-server.db
  extraEnv:
    # Cluster-internal only — no external access, minimal security risk.
    - name: SKIP_TOKEN_VALIDATION
      value: "true"
  persistentVolumeClaim:
    enabled: true
    accessModes:
      - ReadWriteOnce
    storage: 200Gi
    storageClassName: longhorn
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []

externalSecrets:
  enabled: false
  secretStore: "vault-backend"
  githubPat:
    remoteRef:
      key: "github/actions-pat"
      property: "token"

# Zot pull-through cache for Docker Hub.
# Deployed in arc-systems on theia-prod only.
# theia-prod runners: http://theia-arc-systems-zot.arc-systems.svc.cluster.local:5000
# parma runners:      http://131.159.88.30:30081 (NodePort on theia-prod node)
zot:
  enabled: true
  mountConfig: true
  configFiles:
    config.json: |-
      {
        "distSpecVersion": "1.1.0",
        "storage": {
          "rootDirectory": "/var/lib/registry",
          "gc": true,
          "gcDelay": "1h",
          "gcInterval": "6h",
          "retention": {
            "policies": [
              {
                "repositories": ["**"],
                "keepTags": [
                  {
                    "mostRecentlyPulledCount": 100,
                    "pulledWithin": "720h"
                  }
                ]
              }
            ]
          }
        },
        "http": {
          "address": "0.0.0.0",
          "port": "5000"
        },
        "log": {
          "level": "info"
        },
        "extensions": {
          "sync": {
            "enable": true,
            "credentialsFile": "/etc/zot-credentials/credentials.json",
            "registries": [
              {
                "urls": ["https://registry-1.docker.io"],
                "onDemand": true,
                "tlsVerify": true,
                "preserveDigest": false,
                "maxRetries": 3,
                "retryDelay": "5m",
                "content": [
                  {
                    "prefix": "**"
                  }
                ]
              }
            ]
          }
        }
      }
  extraVolumes:
    - name: zot-credentials
      secret:
        secretName: zot-dockerhub-credentials
  extraVolumeMounts:
    - name: zot-credentials
      mountPath: /etc/zot-credentials
      readOnly: true
  persistence: true
  pvc:
    create: true
    storage: 100Gi
    storageClassName: "csi-rbd-sc"
    accessModes:
      - ReadWriteOnce
  service:
    type: NodePort
    port: 5000
    nodePort: 30081
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 4Gi
  nodeSelector:
    kubernetes.io/arch: amd64

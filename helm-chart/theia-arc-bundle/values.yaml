global:
  storageClass: "csi-rbd-sc"
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []

createNamespaces: true

arcController:
  enabled: true

arcRunners:
  enabled: false
  githubConfigUrl: "https://github.com/EduIDE"
  githubConfigSecret: "github-arc-secret-eduidec"
  minRunners: 10
  maxRunners: 50
  runnerScaleSetName: "arc-stateless-eduide"
  controllerServiceAccount:
    namespace: arc-systems
    # This must match <Part-1-release-name>-gha-rs-controller.
    # Part 1 MUST be deployed with: helm install theia-arc-systems ...
    name: theia-arc-systems-gha-rs-controller
  template:
    spec:
      serviceAccountName: arc-runner-set-stateless-sa
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --group=1001
            # Route docker.io pulls through Zot pull-through cache to avoid Docker Hub rate limits.
            - --registry-mirror=http://131.159.88.117:30081
            - --insecure-registry=131.159.88.117:30081
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: runner
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
            # The falcondev runner reads CUSTOM_ACTIONS_RESULTS_URL from the
            # system environment and uses it to override the GitHub-provided
            # ACTIONS_RESULTS_URL before passing it to actions.  Without this,
            # the runner binary replaces our pod-level ACTIONS_RESULTS_URL with
            # GitHub's own ResultsServiceUrl, so cache traffic goes to GitHub
            # instead of our self-hosted cache server.
            - name: CUSTOM_ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}

arcRunnersArm:
  enabled: false
  githubConfigUrl: "https://github.com/EduIDE"
  githubConfigSecret: "github-arc-secret-eduidec"
  minRunners: 10
  maxRunners: 50
  runnerScaleSetName: "arc-stateless-eduide-arm64"
  controllerServiceAccount:
    namespace: arc-systems
    # Must match <Part-1-release-name>-gha-rs-controller (release name must be theia-arc-systems)
    name: theia-arc-systems-gha-rs-controller
  template:
    spec:
      serviceAccountName: arc-runner-set-stateless-arm-sa
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --group=1001
            # Route docker.io pulls through Zot NodePort reachable cross-cluster.
            - --registry-mirror=http://131.159.88.117:30081
            - --insecure-registry=131.159.88.117:30081
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: runner
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
            - name: CUSTOM_ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: work
          emptyDir:
            medium: Memory
            sizeLimit: 30Gi
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}

# AMD64 BuildKit runner set that routes docker builds to stateful BuildKit workers.
# BuildKit workers live in the buildkit-exp namespace (raw manifests).
# Workflows opt in explicitly with: runs-on: arc-buildkit-eduide-amd64
arcRunnersExp:
  enabled: true
  githubConfigUrl: "https://github.com/EduIDE"
  githubConfigSecret: "github-arc-secret-eduidec"
  minRunners: 10
  maxRunners: 50
  runnerScaleSetName: "arc-buildkit-eduide-amd64"
  controllerServiceAccount:
    namespace: arc-systems
    name: theia-arc-systems-gha-rs-controller
  buildkit:
    namespace: buildkit-exp
    numWorkers: 7
  template:
    spec:
      serviceAccountName: arc-runner-set-stateless-sa
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --group=1001
            - --registry-mirror=http://131.159.88.117:30081
            - --insecure-registry=131.159.88.117:30081
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: runner
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
            - name: CUSTOM_ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
            # Injected into every job so workflow steps can compute the correct BuildKit worker
            # address without hard-coding the namespace or replica count.
            - name: BUILDKIT_NAMESPACE
              value: buildkit-exp
            - name: BUILDKIT_NUM_WORKERS
              value: "7"
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}


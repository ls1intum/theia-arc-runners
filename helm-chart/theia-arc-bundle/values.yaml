global:
  storageClass: "csi-rbd-sc"
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []

arcController:
  enabled: true

arcRunners:
  enabled: true
  githubConfigUrl: "https://github.com/ls1intum"
  githubConfigSecret: "github-arc-secret"
  minRunners: 10
  maxRunners: 50
  runnerScaleSetName: "arc-runner-set-stateless"
  controllerServiceAccount:
    namespace: arc-systems
    # This must match <Part-1-release-name>-gha-rs-controller.
    # Part 1 MUST be deployed with: helm install theia-arc-systems ...
    name: theia-arc-systems-gha-rs-controller
  template:
    spec:
      serviceAccountName: arc-runner-set-stateless-sa
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/actions/actions-runner:latest
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --group=1001
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_CACHE_URL
              value: http://github-actions-cache-server.arc-systems.svc.cluster.local:3000/
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}

arcRunnersArm:
  enabled: false
  githubConfigUrl: "https://github.com/ls1intum"
  githubConfigSecret: "github-arc-secret"
  minRunners: 10
  maxRunners: 50
  runnerScaleSetName: "arc-runner-set-arm64"
  controllerServiceAccount:
    namespace: arc-systems
    # Must match <Part-1-release-name>-gha-rs-controller (release name must be theia-arc-systems)
    name: theia-arc-systems-gha-rs-controller
  template:
    spec:
      serviceAccountName: arc-runner-set-stateless-arm-sa
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/actions/actions-runner:latest
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --group=1001
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_CACHE_URL
              value: http://github-actions-cache-server.arc-systems.svc.cluster.local:3000/
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: work
          emptyDir:
            medium: Memory
            sizeLimit: 30Gi
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}

cacheServer:
  enabled: true
  replicaCount: 1
  config:
    apiBaseUrl: ""
    enableDirectDownloads: false
    cacheCleanupOlderThanDays: 90
    storage:
      driver: filesystem
      filesystem:
        path: /data/cache
    db:
      driver: sqlite
      sqlite:
        path: /data/cache-server.db
  persistentVolumeClaim:
    enabled: true
    accessModes:
      - ReadWriteOnce
    storage: 200Gi
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []

externalSecrets:
  enabled: false
  secretStore: "vault-backend"
  githubPat:
    remoteRef:
      key: "github/actions-pat"
      property: "token"

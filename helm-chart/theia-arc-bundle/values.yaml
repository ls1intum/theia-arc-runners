cache-server:
  enabled: true
  replicaCount: 1
  config:
    # Must include port — the auto-generated default omits it.
    apiBaseUrl: "http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000"
    enableDirectDownloads: false
    cacheCleanupOlderThanDays: 90
    storage:
      driver: filesystem
      filesystem:
        path: /data/cache
    db:
      driver: sqlite
      sqlite:
        path: /data/cache-server.db
  extraEnv:
    # Cluster-internal only — no external access, minimal security risk.
    - name: SKIP_TOKEN_VALIDATION
      value: "true"
  persistentVolumeClaim:
    enabled: true
    accessModes:
      - ReadWriteOnce
    storage: 200Gi
    storageClassName: longhorn
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []

externalSecrets:
  enabled: false
  secretStore: "vault-backend"
  githubPat:
    remoteRef:
      key: "github/actions-pat"
      property: "token"

# Zot is deployed via standalone `theia-zot` chart in `zot-system`.

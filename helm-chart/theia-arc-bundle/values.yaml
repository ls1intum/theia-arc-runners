global:
  storageClass: "csi-rbd-sc"
  nodeSelector:
    kubernetes.io/arch: amd64

# Experimental runner set that routes docker builds to stateful BuildKit workers.
# BuildKit workers live in the buildkit-exp namespace (raw manifests, not Helm).
# Workflows opt in explicitly with: runs-on: arc-runner-set-buildkit-exp
# Hash key: GITHUB_REPOSITORY + "::" + dockerfile_path → deterministic worker selection.
# Set enabled: true when buildkit-exp namespace is deployed on theia-prod.
arcRunnersExp:
  enabled: false
  githubConfigUrl: "https://github.com/ls1intum"
  githubConfigSecret: "github-arc-secret"
  minRunners: 0
  maxRunners: 10
  runnerScaleSetName: "arc-runner-set-buildkit-exp"
  controllerServiceAccount:
    namespace: arc-systems
    name: theia-arc-systems-gha-rs-controller
  buildkit:
    namespace: buildkit-exp
    numWorkers: 5
  template:
    spec:
      serviceAccountName: arc-runner-set-stateless-sa
      initContainers:
        - name: init-dind-externals
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
          volumeMounts:
            - name: dind-externals
              mountPath: /home/runner/tmpDir
      containers:
        - name: dind
          image: docker:dind
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --group=1001
            - --registry-mirror=http://131.159.88.30:30081
            - --insecure-registry=131.159.88.30:30081
          securityContext:
            privileged: true
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
            - name: dind-externals
              mountPath: /home/runner/externals
        - name: runner
          image: ghcr.io/falcondev-oss/actions-runner:latest
          command: ["/home/runner/run.sh"]
          env:
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
            - name: CUSTOM_ACTIONS_RESULTS_URL
              value: http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000/
            # Injected into every job so workflow steps can compute the correct BuildKit worker
            # address without hard-coding the namespace or replica count.
            - name: BUILDKIT_NAMESPACE
              value: buildkit-exp
            - name: BUILDKIT_NUM_WORKERS
              value: "5"
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: dind-sock
              mountPath: /var/run
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 8Gi
      volumes:
        - name: work
          emptyDir: {}
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}

cache-server:
  enabled: true
  replicaCount: 1
  config:
    # Must include port — the auto-generated default omits it.
    apiBaseUrl: "http://theia-arc-systems-cache-server.arc-systems.svc.cluster.local:3000"
    enableDirectDownloads: false
    cacheCleanupOlderThanDays: 90
    storage:
      driver: filesystem
      filesystem:
        path: /data/cache
    db:
      driver: sqlite
      sqlite:
        path: /data/cache-server.db
  extraEnv:
    # Cluster-internal only — no external access, minimal security risk.
    - name: SKIP_TOKEN_VALIDATION
      value: "true"
  persistentVolumeClaim:
    enabled: true
    accessModes:
      - ReadWriteOnce
    storage: 200Gi
    storageClassName: longhorn
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  nodeSelector:
    kubernetes.io/arch: amd64
  tolerations: []

externalSecrets:
  enabled: false
  secretStore: "vault-backend"
  githubPat:
    remoteRef:
      key: "github/actions-pat"
      property: "token"

# Zot pull-through cache for Docker Hub.
# Deployed in arc-systems on theia-prod only.
# theia-prod runners: http://theia-arc-systems-zot.arc-systems.svc.cluster.local:5000
# parma runners:      http://131.159.88.30:30081 (NodePort on theia-prod node)
zot:
  enabled: true
  mountConfig: true
  configFiles:
    config.json: |-
      {
        "distSpecVersion": "1.1.0",
        "storage": {
          "rootDirectory": "/var/lib/registry",
          "dedupe": true,
          "gc": true,
          "gcDelay": "1h",
          "gcInterval": "6h",
          "retention": {
            "policies": [
              {
                "repositories": ["**"],
                "keepTags": [
                  {
                    "mostRecentlyPulledCount": 100,
                    "pulledWithin": "720h"
                  }
                ]
              }
            ]
          }
        },
        "http": {
          "address": "0.0.0.0",
          "port": "5000",
          "Compat": true
        },
        "log": {
          "level": "info"
        },
        "extensions": {
          "sync": {
            "enable": true,
            "credentialsFile": "/etc/zot-credentials/credentials.json",
            "registries": [
              {
                "urls": ["https://registry-1.docker.io"],
                "onDemand": true,
                "pollInterval": "24h",
                "tlsVerify": true,
                "preserveDigest": true,
                "maxRetries": 3,
                "retryDelay": "1m",
                "content": [
                  {
                    "prefix": "**"
                  }
                ]
              }
            ]
          }
        }
      }
  extraVolumes:
    - name: zot-credentials
      secret:
        secretName: zot-dockerhub-credentials
  extraVolumeMounts:
    - name: zot-credentials
      mountPath: /etc/zot-credentials
      readOnly: true
  persistence: true
  pvc:
    create: true
    storage: 100Gi
    storageClassName: "csi-rbd-sc"
    accessModes:
      - ReadWriteOnce
  service:
    type: NodePort
    port: 5000
    nodePort: 30081
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 4Gi
  nodeSelector:
    kubernetes.io/arch: amd64

apiVersion: v2
name: theia-arc-bundle
description: GitHub Actions Runner Controller for self-hosted runners
type: application
version: 0.1.0
appVersion: "1.0"
home: https://github.com/ls1intum/theia-arc-runners
sources:
  - https://github.com/ls1intum/theia-arc-runners
maintainers:
  - name: ls1intum
    url: https://github.com/ls1intum

dependencies:
  # External ARC Controller
  - name: gha-runner-scale-set-controller
    version: 0.9.3
    repository: "oci://ghcr.io/actions/actions-runner-controller-charts"
    alias: arcController
    condition: arcController.enabled

  # External ARC Runner Scale Set (AMD64)
  - name: gha-runner-scale-set
    version: 0.9.3
    repository: "oci://ghcr.io/actions/actions-runner-controller-charts"
    alias: arcRunners
    condition: arcRunners.enabled

  # External ARC Runner Scale Set (ARM64)
  - name: gha-runner-scale-set
    version: 0.9.3
    repository: "oci://ghcr.io/actions/actions-runner-controller-charts"
    alias: arcRunnersArm
    condition: arcRunnersArm.enabled

  # GitHub Actions Cache Server (local subchart from https://github.com/falcondev-oss/github-actions-cache-server)
  - name: github-actions-cache-server
    version: 1.0.0
    alias: cache-server
    condition: cache-server.enabled

  # Harbor registry (pull-through proxy cache for Docker Hub and GHCR)
  - name: harbor
    version: "1.18.2"
    repository: "https://helm.goharbor.io"
    alias: harbor
    condition: harbor.enabled

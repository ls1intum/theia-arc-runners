# ARM64-specific values for parma cluster
# Usage: helm install/upgrade ... -f values.yaml -f values-arm64.yaml

global:
  storageClass: "local-path"
  nodeSelector:
    kubernetes.io/arch: arm64

# Disable AMD64 runners
arcRunners:
  enabled: false

# Enable ARM64 runners
arcRunnersArm:
  enabled: true
  template:
    spec:
      volumes:
        - name: work
          emptyDir:
            medium: Memory
            sizeLimit: 30Gi
        - name: dind-sock
          emptyDir: {}
        - name: dind-externals
          emptyDir: {}

cache-server:
  enabled: true
  persistentVolumeClaim:
    storage: 200Gi
  nodeSelector:
    kubernetes.io/arch: arm64
